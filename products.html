<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h2 class="logo">ShopKart</h2>
  <input type="text" placeholder="Search...">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart 🛒 (<span id="count">0</span>)</a>
  </div>
</header>

<section class="product-grid">

  <div class="product">
    <img src="https://via.placeholder.com/150">
    <h4>Smartphone</h4>
    <p>₹12,999</p>
    <button onclick="addToCart('Smartphone',12999)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150">
    <h4>Running Shoes</h4>
    <p>₹2,499</p>
    <button onclick="addToCart('Shoes',2499)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150">
    <h4>Headphones</h4>
    <p>₹1,299</p>
    <button onclick="addToCart('Headphones',1299)">Add</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
